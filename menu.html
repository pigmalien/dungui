<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dungui Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div>
    <h1>Menu Test</h1>
        <button id="theme-toggle" class="btn btn-yellow" style="position: absolute; top: 20px; right: 20px;">Toggle Theme</button>
        <button class="btn btn-blue" disabled>Continue</button>
        <button class="btn btn-blue">Start Game</button>
        <button class="btn btn-green">Load Game</button>
        <button class="btn btn-yellow">Options</button>
        <button class="btn btn-red">Exit</button>
   </div>
       <h2 style="margin-bottom: 40px; text-shadow: 2px 2px 0px var(--text-shadow);">SELECT CLASS</h2>

    <div class="pixel-radio-group">
        <label class="pixel-radio">
            <input type="radio" checked="checked" name="class">
            <span class="checkmark"></span>
            <span class="label-text">WARRIOR</span>
        </label>
        
        <label class="pixel-radio">
            <input type="radio" name="class">
            <span class="checkmark"></span>
            <span class="label-text">PALADIN</span>
        </label>
        
        <label class="pixel-radio">
            <input type="radio" name="class">
            <span class="checkmark"></span>
            <span class="label-text">MAGE</span>
        </label>
        
        <label class="pixel-radio">
            <input type="radio" name="class" disabled>
            <span class="checkmark"></span>
            <span class="label-text">NECROMANCER (LOCKED)</span>
        </label>
    </div> 

    <h2 style="margin-top: 30px; margin-bottom: 20px; text-shadow: 2px 2px 0px var(--text-shadow);">SETTINGS</h2>
    <div class="pixel-radio-group">
        <label class="pixel-checkbox">
            <input type="checkbox">
            <span class="checkmark"></span>
            <span class="label-text">HARDCORE MODE</span>
        </label>

        <label class="pixel-checkbox">
            <input type="checkbox" disabled checked>
            <span class="checkmark"></span>
            <span class="label-text">GOD MODE (LOCKED)</span>
        </label>

        <label class="pixel-switch">
            <input type="checkbox" checked>
            <div class="track">
                <div class="handle"></div>
            </div>
            <span class="label-text">VIBRATION</span>
        </label>
    </div>

    <div class="slider-container">
        <div class="slider-label">
            <span>MUSIC VOLUME</span>
            <span>75%</span>
        </div>
        <input type="range" min="0" max="100" value="75">
    </div>

    <div class="pixel-box" style="margin-top: 30px; max-width: 350px;">
        <h3 class="label-text" style="margin-top: 0;">QUEST LOG</h3>
        <p style="font-family: sans-serif; line-height: 1.4;">Find the missing pixel in the stylesheet.<br>Reward: 500 Gold</p>
    </div>

    <div class="pixel-box-2" style="margin-top: 30px; max-width: 350px;">
        <h3 class="label-text" style="margin-top: 0;">INVENTORY</h3>
        <p style="font-family: sans-serif; line-height: 1.4;">Check your items and equipment.<br>Capacity: 12/20</p>
    </div>

    <script>
        const toggleBtn = document.getElementById('theme-toggle');
        toggleBtn.addEventListener('click', () => {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            html.setAttribute('data-theme', currentTheme === 'light' ? 'dark' : 'light');
        });
    </script>
</body>
</html>
